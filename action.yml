name: "Cloudflare Purge Cache Action"
description: "GitHub Action to purge Cloudflare cache by zone name or zone ID. Supports single and multiple zones."
author: "dvlop"

branding:
  icon: "cloud"
  color: "orange"

inputs:
  cf_email:
    description: "Cloudflare account email address"
    required: false
  cf_api_key:
    description: "Cloudflare Global API Key"
    required: false
  cf_zone_name:
    description: "Single zone name (domain) to purge cache for"
    required: false
  cf_zone_names:
    description: "Comma-separated list of zone names to purge cache for"
    required: false
  cf_zone_id:
    description: "Single Cloudflare Zone ID to purge cache for"
    required: false
  cf_zone_ids:
    description: "Comma-separated list of Cloudflare Zone IDs to purge cache for"
    required: false
  cf_page_count:
    description: "Number of zones per page when fetching zones (default: 20, increase if you have many zones)"
    required: false
    default: "20"

runs:
  using: "docker"
  image: "Dockerfile"
  env:
    CF_EMAIL_ADDR: ${{ inputs.cf_email }}
    CF_API_KEY: ${{ inputs.cf_api_key }}
    CF_ZONE_NAME: ${{ inputs.cf_zone_name }}
    CF_ZONE_NAMES: ${{ inputs.cf_zone_names }}
    CF_ZONE_ID: ${{ inputs.cf_zone_id }}
    CF_ZONE_IDS: ${{ inputs.cf_zone_ids }}
    CF_PAGE_COUNT: ${{ inputs.cf_page_count }}
